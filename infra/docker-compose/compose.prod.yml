name: dataplatform

# ─────────────────────────────────────────────────────────────────────────
# Production / on-prem stack (lean). Self-contained — does NOT include the dev
# compose.yml. Run on the server with:
#
#     docker compose -f infra/docker-compose/compose.prod.yml up -d --build
#
# vs the dev compose.yml this drops: the 4 Vite dev-server containers (SPAs are
# baked static into the portal image), keycloak (custom cookie auth), the app
# postgres (SQLite), gateway (portal talks to backend directly), and the demo
# DB sources (DB-connection feature removed). That frees ~1 GB RAM and removes
# the runtime npm/network dependency — sized for a small (~8 GB) box.
#
# Needs backend/.env with LLM_PROVIDER=anthropic + ANTHROPIC_API_KEY for the
# copilot. Data persists in the named volumes below.
# ─────────────────────────────────────────────────────────────────────────
x-restart: &restart
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    <<: *restart
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-redis} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    <<: *restart
    env_file:
      - ../../backend/.env
    environment:
      BACKEND_DATABASE_URL: sqlite+aiosqlite:////uploads/appdb/app.db
      BACKEND_REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      BACKEND_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKEND_CREDENTIAL_KEY: ${BACKEND_CREDENTIAL_KEY:-KbhP6uONwhnJDuYcXvi_BZxiImf_venYe_6eI4kCbvI=}
      # Per-cell edits use a lighter/faster model (single-shot, no multi-turn).
      COPILOT_EDIT_MODEL: ${COPILOT_EDIT_MODEL:-claude-haiku-4-5-20251001}
      # Custom cookie auth — OIDC/keycloak off.
      BACKEND_OIDC_ENABLED: "false"
    volumes:
      - uploads-data:/uploads
    depends_on:
      redis:
        condition: service_healthy
    command:
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  # JupyterHub (DockerSpawner) — 사용자별 격리 컨테이너. base_url=/jupyter/.
  # docker.sock 마운트 필수: DockerSpawner가 호스트 Docker 데몬으로 노트북 컨테이너를 스폰한다.
  jupyterhub:
    build:
      context: ../jupyterhub
      dockerfile: Dockerfile
    # 명시 image 태그 — 아래 jupyter-gc 가 같은 이미지를 재사용해 빌드를 1회로 묶는다.
    image: dataplatform/jupyterhub:0.1.0
    <<: *restart
    environment:
      BACKEND_URL: http://backend:8000
      USER_IMAGE: dataplatform/notebook-user:0.1.0
      # prod 프로젝트명 dataplatform → 기본 네트워크 dataplatform_default.
      DOCKER_NETWORK: dataplatform_default
      JUPYTERHUB_ACTIVE_SERVER_LIMIT: ${JUPYTERHUB_ACTIVE_SERVER_LIMIT:-3}
      JUPYTERHUB_USER_MEM_LIMIT: ${JUPYTERHUB_USER_MEM_LIMIT:-1.5G}
      JUPYTERHUB_USER_CPU_LIMIT: ${JUPYTERHUB_USER_CPU_LIMIT:-2.0}
      # 노트북 서버 회수 정책: 30분 유휴 + 1일 하드캡(자원 절약).
      JUPYTERHUB_CULL_TIMEOUT: ${JUPYTERHUB_CULL_TIMEOUT:-1800}
      JUPYTERHUB_CULL_MAX_AGE: ${JUPYTERHUB_CULL_MAX_AGE:-86400}
    depends_on:
      - backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # jupyter-gc — 사용자 볼륨 1일 정리 루프. 허브 이미지를 그대로 재사용하고
  # 커맨드만 GC 스크립트로 바꾼다(추가 이미지·외부망 불필요 — 닫힌 망 안전).
  # idle-culler 가 서버(RAM)를 내리면, 이 루프가 분리되고 1일 지난
  # jupyterhub-user-* 볼륨(디스크)을 삭제한다. 사용 중 볼륨은 절대 건드리지 않음.
  jupyter-gc:
    image: dataplatform/jupyterhub:0.1.0
    build:
      context: ../jupyterhub
      dockerfile: Dockerfile
    <<: *restart
    command: ["python", "/srv/jupyterhub/volume_gc.py"]
    environment:
      GC_RETENTION_SECONDS: ${JUPYTERHUB_DATA_RETENTION_SECONDS:-86400}
      GC_INTERVAL_SECONDS: ${JUPYTERHUB_GC_INTERVAL_SECONDS:-3600}
    depends_on:
      - jupyterhub
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # jupyter-user-image — `docker compose build` 시 사용자 노트북 이미지를 미리 빌드.
  # DockerSpawner는 이미지를 이름으로 찾으므로 up 전에 이미지가 존재해야 한다.
  jupyter-user-image:
    build:
      context: ../jupyterhub/user-image
      dockerfile: Dockerfile
    image: dataplatform/notebook-user:0.1.0
    command: ["true"]
    restart: "no"

  portal:
    build:
      context: ../..
      dockerfile: infra/portal/Dockerfile
    <<: *restart
    depends_on:
      - backend
      - jupyterhub
    # Single public entrypoint. The on-prem (holdings) server only opens one
    # host port to the outside, so default to 5500 — the port that box exposes.
    # Override with PORTAL_PORT=<n> if a different host port is opened.
    ports:
      - "${PORTAL_PORT:-5500}:80"

volumes:
  redis-data:
  uploads-data:
