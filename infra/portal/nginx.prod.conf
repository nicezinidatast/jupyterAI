# Production single entrypoint. SPAs are served as STATIC files (built into
# this image); /api and /jupyter are proxied. Mirrors the routing of the dev
# nginx.conf but without the Vite dev-server proxies.
#   GET /             — 302 → /login/
#   GET /login/*      — login SPA (static)
#   GET /platform     — old persona-picker landing (static index.html)
#   GET /admin/*      — admin-console (static)
#   GET /auditor/*    — auditor-console (static)
#   GET /analyst/*    — analyst-workspace (static)
#   *   /api/*        — backend FastAPI
#   *   /jupyter/*    — JupyterHub (사용자별 노트북 서버, + WebSocket upgrades)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # Published host port differs from container :80 → keep redirects relative.
    absolute_redirect off;

    # 업스트림 재해석: docker 내장 DNS로 proxy_pass(변수)를 요청마다 다시 해석한다.
    # backend·jupyterhub 컨테이너를 재빌드/recreate하면 IP가 바뀌는데, 정적 proxy_pass는
    # 옛 IP를 캐시해 502를 내므로(포털 수동 재시작 필요) 변수+resolver로 영구 회피한다.
    # (SPA는 정적 파일이라 업스트림이 없어 해당 없음.)
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # Bare root → login page (login SPA forwards authenticated users to /analyst/).
    location = / {
        return 302 /login/;
    }

    # Old persona-picker landing — reachable only by typing /platform directly.
    location ~ ^/platform/?$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── SPAs (static) ──────────────────────────────────────────────────────
    # Each SPA built with its own base path; client-side routing falls back to
    # that SPA's index.html. Hashed assets get a long cache; index.html doesn't.
    location /admin/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /admin/index.html;
    }
    location /auditor/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /auditor/index.html;
    }
    location /analyst/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /analyst/index.html;
    }
    location /login/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /login/index.html;
    }

    # Long-cache the content-hashed build assets (safe: filenames change on rebuild).
    location ~* /(admin|auditor|analyst|login)/assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API ────────────────────────────────────────────────────────
    location /api/ {
        # 변수 proxy_pass는 위치 접두사 자동 치환을 안 하므로 원경로 전체를 넘긴다.
        set $up_backend backend;
        proxy_pass http://$up_backend:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── JupyterHub (사용자별 노트북 서버) ────────────────────────────────────
    # base_url=/jupyter/ 아래 허브(/jupyter/hub/...)와 사용자 서버(/jupyter/user/<id>/...)를
    # 모두 제공하므로 location 하나면 충분. WebSocket(커널 채널·허브 이벤트)은 map의
    # $connection_upgrade로 자동 처리, 86400s 타임아웃으로 유휴 커널 WS가 안 끊기게 한다.
    location /jupyter/ {
        set $up_hub jupyterhub;
        proxy_pass http://$up_hub:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }
}
