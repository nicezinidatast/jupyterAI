# Production single entrypoint. SPAs are served as STATIC files (built into
# this image); /api and /jupyter are proxied. Mirrors the routing of the dev
# nginx.conf but without the Vite dev-server proxies.
#   GET /             — 302 → /login/
#   GET /login/*      — login SPA (static)
#   GET /platform     — old persona-picker landing (static index.html)
#   GET /admin/*      — admin-console (static)
#   GET /auditor/*    — auditor-console (static)
#   GET /analyst/*    — analyst-workspace (static)
#   *   /api/*        — backend FastAPI
#   *   /jupyter/*    — JupyterLab embed (+ WebSocket upgrades)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # Published host port differs from container :80 → keep redirects relative.
    absolute_redirect off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # Bare root → login page (login SPA forwards authenticated users to /analyst/).
    location = / {
        return 302 /login/;
    }

    # Old persona-picker landing — reachable only by typing /platform directly.
    location ~ ^/platform/?$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── SPAs (static) ──────────────────────────────────────────────────────
    # Each SPA built with its own base path; client-side routing falls back to
    # that SPA's index.html. Hashed assets get a long cache; index.html doesn't.
    location /admin/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /admin/index.html;
    }
    location /auditor/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /auditor/index.html;
    }
    location /analyst/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /analyst/index.html;
    }
    location /login/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /login/index.html;
    }

    # Long-cache the content-hashed build assets (safe: filenames change on rebuild).
    location ~* /(admin|auditor|analyst|login)/assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── JupyterLab embed ───────────────────────────────────────────────────
    # Kernel channels (WebSocket).
    location ~ ^/jupyter/api/kernels/.+/channels$ {
        proxy_pass http://jupyter:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
    # Server events stream (WebSocket).
    location = /jupyter/api/events/subscribe {
        proxy_pass http://jupyter:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
    # Static / API (plain HTTP).
    location /jupyter/ {
        proxy_pass http://jupyter:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
