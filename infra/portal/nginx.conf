# Single entrypoint for the whole dataplatform demo.
#   GET /             — 302 redirect → /login/ (login page first; the login
#                       SPA forwards already-authenticated users to /analyst/)
#   GET /login/*      — login SPA (no auth gate)
#   GET /platform     — old persona-picker landing (URL-only, not linked)
#   GET /admin/*      — admin-console (Vite dev)
#   GET /auditor/*    — auditor-console
#   GET /analyst/*    — analyst-workspace
#   *   /api/*        — backend FastAPI
#   *   /jupyter/*    — JupyterHub (사용자별 노트북 서버)
#
# Vite HMR is a WebSocket; the `Upgrade` / `Connection` headers below pass it
# through transparently so live-reload still works after the consolidation.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # ── 업스트림 재해석(re-resolve) ─────────────────────────────────────────
    # 도커 내장 DNS(127.0.0.11)를 resolver로 지정하고, 아래 모든 proxy_pass를
    # *변수*로 쓴다. 그래야 nginx가 시작 시점에 IP를 한 번 박아두지 않고 요청마다
    # (valid=10s 캐시) 이름을 다시 해석한다. 백엔드·SPA·허브 컨테이너를 재빌드/
    # recreate하면 IP가 바뀌는데, 정적 proxy_pass는 옛 IP를 캐시해 502를 내므로
    # (포털을 매번 수동 재시작해야 했음) 이 패턴으로 영구히 회피한다.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # The portal is published on a different host port (5180) than the container
    # listens on (80). With absolute_redirect on (the default) nginx would build
    # Location URLs with the internal :80, sending browsers to localhost:80
    # (connection refused). Relative redirects keep the original host:port.
    absolute_redirect off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # Bare root → login page. The login SPA checks /api/auth/me and forwards
    # already-authenticated users straight to /analyst/.
    location = / {
        return 302 /login/;
    }

    # Old persona-picker landing — reachable only by typing /platform directly
    # (it is not linked from anywhere). Served statically from index.html.
    # Handle both /platform and /platform/ (browsers may add the trailing slash).
    location ~ ^/platform/?$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Each SPA upstream — Vite dev servers all listen on :80 inside their
    # containers.  proxy_pass(변수, URI 없음)는 원래 요청 경로를 그대로 전달하므로
    # Vite의 base path(/admin/, /auditor/, ...)가 계속 매칭된다.
    # NOTE: proxy_read_timeout must comfortably exceed the idle gaps on the
    # Vite HMR WebSocket. At 30s nginx was cutting the idle WS, the Vite
    # client logged "server connection lost" and force-reloaded the page —
    # wiping SPA state (copilot chat history) roughly every 30s of idle time.
    location /admin/ {
        set $up_admin spa;
        proxy_pass http://$up_admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    location /auditor/ {
        set $up_auditor spa-auditor;
        proxy_pass http://$up_auditor:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    location /analyst/ {
        set $up_analyst spa-analyst;
        proxy_pass http://$up_analyst:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    # Login SPA — no auth gate (this IS the login page). Served by the
    # spa-platform container (Vite base /login/).
    location /login/ {
        set $up_login spa-platform;
        proxy_pass http://$up_login:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        # 변수 proxy_pass는 위치 접두사 자동 치환을 안 하므로, 원래 경로 전체를
        # $request_uri로 넘긴다(/api/...는 백엔드가 그대로 받는다 — 기존과 동일).
        set $up_backend backend;
        proxy_pass http://$up_backend:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # JupyterHub 전체 프록시 — 단일 location으로 통합.
    #
    # JupyterHub는 base_url=/jupyter/ 아래 허브(/jupyter/hub/...)와 사용자 노트북
    # 서버(/jupyter/user/<id>/...)를 모두 제공하므로 location 하나로 충분하다.
    # WebSocket(커널 채널·허브 이벤트·HMR)은 map의 $connection_upgrade로 자동 처리,
    # proxy_read_timeout 86400s로 장시간 유휴 커널 WS가 끊기지 않게 한다.
    location /jupyter/ {
        set $up_hub jupyterhub;
        proxy_pass http://$up_hub:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }
}
