# Single entrypoint for the whole dataplatform demo.
#   GET /             — 302 redirect → /login/ (login page first; the login
#                       SPA forwards already-authenticated users to /analyst/)
#   GET /login/*      — login SPA (no auth gate)
#   GET /platform     — old persona-picker landing (URL-only, not linked)
#   GET /admin/*      — admin-console (Vite dev)
#   GET /auditor/*    — auditor-console
#   GET /analyst/*    — analyst-workspace
#   *   /api/*        — backend FastAPI
#   *   /jupyter/*    — JupyterLab (analyst workspace embed)
#
# Vite HMR is a WebSocket; the `Upgrade` / `Connection` headers below pass it
# through transparently so live-reload still works after the consolidation.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # The portal is published on a different host port (5180) than the container
    # listens on (80). With absolute_redirect on (the default) nginx would build
    # Location URLs with the internal :80, sending browsers to localhost:80
    # (connection refused). Relative redirects keep the original host:port.
    absolute_redirect off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # Bare root → login page. The login SPA checks /api/auth/me and forwards
    # already-authenticated users straight to /analyst/.
    location = / {
        return 302 /login/;
    }

    # Old persona-picker landing — reachable only by typing /platform directly
    # (it is not linked from anywhere). Served statically from index.html.
    location = /platform {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Each SPA upstream — Vite dev servers all listen on :80 inside their
    # containers.  proxy_pass without a trailing slash preserves the path so
    # Vite's base path (/admin/, /auditor/, ...) keeps matching.
    # NOTE: proxy_read_timeout must comfortably exceed the idle gaps on the
    # Vite HMR WebSocket. At 30s nginx was cutting the idle WS, the Vite
    # client logged "server connection lost" and force-reloaded the page —
    # wiping SPA state (copilot chat history) roughly every 30s of idle time.
    location /admin/ {
        proxy_pass http://spa:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    location /auditor/ {
        proxy_pass http://spa-auditor:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    location /analyst/ {
        proxy_pass http://spa-analyst:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
    # Login SPA — no auth gate (this IS the login page). Served by the
    # spa-platform container (Vite base /login/).
    location /login/ {
        proxy_pass http://spa-platform:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # JupyterLab kernel channels (WebSocket) — Upgrade headers ONLY here so
    # plain HTTP GET on /jupyter/lab doesn't get confused with a WS handshake.
    location ~ ^/jupyter/api/kernels/.+/channels$ {
        proxy_pass http://jupyter:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # JupyterLab events stream (WebSocket) — /jupyter/api/events/subscribe.
    # JupyterLab >=4 publishes server-side events (kernel lifecycle, contents
    # change, etc.) over this WS. Without Upgrade headers nginx returns 400 and
    # the lab UI logs "events WebSocket closed unexpectedly".
    location = /jupyter/api/events/subscribe {
        proxy_pass http://jupyter:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # JupyterLab static / API — plain HTTP, no Upgrade header.
    location /jupyter/ {
        proxy_pass http://jupyter:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
