# 배포 시작/성공/실패를 Slack Incoming Webhook 으로 보내는 재사용(composite) 액션.
#   - deploy.yml 의 notify-start / notify-result 두 작업이 같은 포맷을 쓰도록 한 곳에 모음.
#   - webhook-url(=secrets.SLACK_WEBHOOK_URL)이 비어 있으면 조용히 건너뜀 → 시크릿 미설정이어도 배포는 정상.
#   - Slack 전송이 실패해도 항상 0 으로 종료 → 알림 문제로 배포가 막히지 않음.
#
# ※ Incoming Webhook URL 은 비밀값(아는 사람은 누구나 그 채널에 글을 쓸 수 있음)이라
#   워크플로 파일에 박지 않고 GitHub Secret(SLACK_WEBHOOK_URL)으로 주입한다.
name: "Slack 배포 알림"
description: "배포 시작/성공/실패를 Slack Incoming Webhook 으로 전송한다. webhook 시크릿이 비어 있으면 건너뛴다."

inputs:
  webhook-url:
    description: "Slack Incoming Webhook URL (secrets.SLACK_WEBHOOK_URL). 비어 있으면 알림을 건너뜀."
    required: true
  status:
    description: "start | success | failure (색·이모지·제목을 결정)"
    required: true
  details:
    description: '본문에 덧붙일 한 줄(예: "prod: success"). 선택.'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Slack 알림 전송
      shell: bash
      env:
        # 입력값
        SLACK_WEBHOOK_URL: ${{ inputs.webhook-url }}
        STATUS: ${{ inputs.status }}
        DETAILS: ${{ inputs.details }}
        # GitHub 컨텍스트(메시지에 들어갈 정보)
        REPO: ${{ github.repository }}
        BRANCH: ${{ github.ref_name }}
        SHA: ${{ github.sha }}
        ACTOR: ${{ github.actor }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        COMMIT_MSG: ${{ github.event.head_commit.message }}
      run: |
        set -euo pipefail

        # webhook 미설정(=아직 시크릿 안 넣음)이면 배포를 막지 않고 조용히 통과
        if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
          echo "SLACK_WEBHOOK_URL 미설정 — Slack 알림을 건너뜁니다."
          exit 0
        fi

        # 상태별 색 막대 / 이모지 / 제목
        case "$STATUS" in
          start)   color="#2f6fe8"; emoji="🚀"; heading="배포 시작";;
          success) color="#2eb67d"; emoji="✅"; heading="배포 성공";;
          failure) color="#e01e5a"; emoji="❌"; heading="배포 실패";;
          *)       color="#64748b"; emoji="ℹ️"; heading="배포 알림";;
        esac

        short_sha="${SHA:0:7}"
        commit_first_line="$(printf '%s' "${COMMIT_MSG:-}" | head -n1)"

        # 섹션1: 제목 + 저장소/브랜치/커밋 (+ 커밋 메시지 첫 줄)
        #   format 문자열은 '작은따옴표' 라 backtick(`) 은 literal → Slack 인라인 코드로 렌더됨.
        section1="$(printf '*%s %s — JupyterAI*\n저장소 *%s* · 브랜치 `%s` · 커밋 `%s`' \
          "$emoji" "$heading" "$REPO" "$BRANCH" "$short_sha")"
        if [ -n "$commit_first_line" ]; then
          section1="$(printf '%s\n%s' "$section1" "$commit_first_line")"
        fi

        # 섹션2: 실행자 (+ 결과 상세: "prod: success")
        section2="$(printf '실행: %s' "$ACTOR")"
        if [ -n "${DETAILS:-}" ]; then
          section2="$(printf '%s\n%s' "$section2" "$DETAILS")"
        fi

        # jq 로 JSON 을 안전하게 조립(커밋 메시지에 따옴표·특수문자가 있어도 안 깨지게).
        payload="$(jq -n \
          --arg color "$color" \
          --arg s1 "$section1" \
          --arg s2 "$section2" \
          --arg run_url "$RUN_URL" \
          '{
            attachments: [
              {
                color: $color,
                blocks: [
                  { type: "section", text: { type: "mrkdwn", text: $s1 } },
                  { type: "section", text: { type: "mrkdwn", text: $s2 } },
                  { type: "actions", elements: [
                      { type: "button",
                        text: { type: "plain_text", text: "Actions 실행 보기" },
                        url: $run_url }
                  ] }
                ]
              }
            ]
          }')"

        # 전송. 알림 실패가 배포를 막지 않도록 항상 성공(exit 0)으로 끝낸다.
        http_code="$(curl -sS -o /tmp/slack_resp.txt -w '%{http_code}' \
          -X POST -H 'Content-type: application/json' \
          --data "$payload" "$SLACK_WEBHOOK_URL" || true)"
        echo "Slack 응답: HTTP ${http_code} - $(cat /tmp/slack_resp.txt 2>/dev/null || true)"
        if [ "$http_code" != "200" ]; then
          echo "::warning::Slack 알림 전송 실패(HTTP ${http_code}). 배포에는 영향 없음."
        fi
        exit 0
