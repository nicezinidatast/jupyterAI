# main 브랜치에 머지(=push)되면 Slack 채널로 알림을 보낸다.
# PR 머지든 직접 push든, main 에 커밋이 들어오면 정확히 한 번 알림이 간다.
#
# ──────────────────────────────────────────────────────────────────────────
# 설정(딱 한 가지만 직접 하면 된다 — 나머지는 이 파일이 처리):
#   1) Slack 에서 Incoming Webhook 을 만든다.
#      Slack → Apps → "Incoming Webhooks" 추가 → 알림 받을 채널 선택 →
#      Webhook URL 복사 (https://hooks.slack.com/services/T.../B.../xxxx 형태).
#   2) 그 URL 을 GitHub 저장소 시크릿으로 등록한다.
#      저장소 → Settings → Secrets and variables → Actions → New repository secret
#      Name:  SLACK_WEBHOOK_URL
#      Value: 복사한 Webhook URL
#   끝. 다음 머지부터 알림이 온다. (시크릿이 없으면 워크플로는 조용히 통과한다.)
#
# 활성화 시점: 이 파일이 main 에 올라간 뒤부터 동작한다(이 브랜치를 머지하는
# 그 푸시부터 바로 켜진다). 수동 테스트는 main 에 올라간 뒤 Actions 탭의
# "Run workflow"(workflow_dispatch)로 할 수 있다.
# ──────────────────────────────────────────────────────────────────────────

name: Slack notify on merge

on:
  push:
    branches: [main]
  # 수동 실행 — 알림이 정상인지 Actions 탭에서 바로 테스트할 수 있다.
  workflow_dispatch:

# 코드를 체크아웃하지 않고 Slack 으로 POST 만 하므로 토큰 권한은 최소로 둔다.
permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          # 사용자가 등록할 단 하나의 시크릿. 미설정이면 아래 가드가 건너뛴다.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          # 시크릿 가드: SLACK_WEBHOOK_URL 이 없으면(아직 미설정) 빨갛게 실패시키지
          # 않고 조용히 건너뛴다 — 시크릿을 넣기 전에도 워크플로는 초록으로 통과한다.
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::notice::SLACK_WEBHOOK_URL 미설정 — 알림 건너뜀. (Settings → Secrets → Actions 에 추가하세요)"
            exit 0
          fi

          # 이벤트 페이로드에서 사람이 읽을 정보를 뽑는다. workflow_dispatch(수동)
          # 실행에는 head_commit/compare 가 없으므로 모두 폴백을 둔다.
          EV="${GITHUB_EVENT_PATH}"
          # 첫 줄만 jq 안에서 뽑는다(| head 파이프 제거 — pipefail+SIGPIPE 풋건 회피).
          COMMIT_MSG=$(jq -r '(.head_commit.message // "수동 실행(테스트 알림)") | split("\n")[0]' "$EV")
          COMMIT_URL=$(jq -r '.head_commit.url // ""' "$EV")
          COMPARE_URL=$(jq -r '.compare // ""' "$EV")
          PUSHER=$(jq -r '.pusher.name // .sender.login // "unknown"' "$EV")
          COMMIT_COUNT=$(jq -r '(.commits | length) // 0' "$EV")

          # 버튼 링크: 비교(diff) URL 우선, 없으면 커밋 URL, 그것도 없으면 저장소 홈.
          LINK_URL="${COMPARE_URL:-$COMMIT_URL}"
          LINK_URL="${LINK_URL:-https://github.com/${GITHUB_REPOSITORY}}"

          # jq 로 페이로드를 만든다 — 커밋 메시지의 따옴표/특수문자가 그대로
          # 안전하게 escape 되어 JSON 이 깨지지 않는다(직접 문자열 조립 금지).
          PAYLOAD=$(jq -n \
            --arg repo   "${GITHUB_REPOSITORY}" \
            --arg branch "${GITHUB_REF_NAME}" \
            --arg pusher "${PUSHER}" \
            --arg msg    "${COMMIT_MSG}" \
            --arg count  "${COMMIT_COUNT}" \
            --arg url    "${LINK_URL}" \
            '{
              text: "✅ \($repo) `\($branch)` 머지: \($msg)",
              blocks: [
                { type: "header",
                  text: { type: "plain_text", text: "✅ 머지 알림", emoji: true } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*저장소:*\n\($repo)" },
                    { type: "mrkdwn", text: "*브랜치:*\n\($branch)" },
                    { type: "mrkdwn", text: "*머지한 사람:*\n\($pusher)" },
                    { type: "mrkdwn", text: "*커밋 수:*\n\($count)" }
                ] },
                { type: "section",
                  text: { type: "mrkdwn", text: "*최근 변경:*\n\($msg)" } },
                { type: "actions", elements: [
                    { type: "button",
                      text: { type: "plain_text", text: "GitHub에서 보기", emoji: true },
                      url: $url }
                ] }
              ]
            }')

          # Slack Incoming Webhook 으로 전송. 성공 시 200 'ok' 를 돌려준다.
          HTTP=$(curl -sS -o /tmp/slack_resp -w "%{http_code}" \
            -X POST -H 'Content-type: application/json' \
            --data "${PAYLOAD}" "${SLACK_WEBHOOK_URL}")
          echo "Slack 응답 HTTP ${HTTP}: $(cat /tmp/slack_resp)"

          # 200 이 아니면(잘못된 webhook URL 등) 워크플로를 실패로 표시해 알린다.
          if [ "${HTTP}" != "200" ]; then
            echo "::error::Slack 전송 실패 (HTTP ${HTTP}). Webhook URL 을 확인하세요."
            exit 1
          fi
