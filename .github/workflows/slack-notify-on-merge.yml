# main 으로 향하는 PR 이 "머지"될 때만 Slack 채널로 알림을 보낸다.
# (그냥 닫기만 하고 머지 안 한 PR 은 알림 없음 — 아래 job 의 if 로 거른다.)
#
# ──────────────────────────────────────────────────────────────────────────
# 설정(딱 한 가지만 직접 하면 된다 — 나머지는 이 파일이 처리):
#   1) Slack 에서 Incoming Webhook 을 만든다.
#      Slack → Apps → "Incoming Webhooks" 추가 → 알림 받을 채널 선택 →
#      Webhook URL 복사 (https://hooks.slack.com/services/T.../B.../xxxx 형태).
#   2) 그 URL 을 GitHub 저장소 시크릿으로 등록한다.
#      저장소 → Settings → Secrets and variables → Actions → New repository secret
#      Name:  SLACK_WEBHOOK_URL
#      Value: 복사한 Webhook URL
#   끝. 다음 PR 머지부터 알림이 온다. (시크릿이 없으면 워크플로는 조용히 통과한다.)
#
# 활성화 시점(중요): pull_request 트리거는 GitHub 가 *기본 브랜치(main)에 있는*
# 워크플로 파일을 읽어 실행한다. 따라서 이 파일이 main 에 올라간 "다음" PR
# 머지부터 동작한다 — 이 브랜치를 머지하는 것 자체로는 알림이 오지 않는다.
# 동작 확인은 main 에 올라간 뒤 Actions 탭의 "Run workflow"(수동 실행)로 한다.
# ──────────────────────────────────────────────────────────────────────────

name: Slack notify on PR merge

on:
  pull_request:
    # closed = 머지 또는 그냥 닫힘. branches=main → main 으로 향하는 PR 만 대상.
    types: [closed]
    branches: [main]
  # 수동 실행 — 알림이 정상인지 Actions 탭에서 바로 테스트할 수 있다.
  workflow_dispatch:

# 코드를 체크아웃하지 않고 Slack 으로 POST 만 하므로 토큰 권한은 최소로 둔다.
permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    # 실제 "머지된" PR 일 때만(단순 닫힘 제외), 그리고 수동 실행 테스트일 때만 돈다.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    steps:
      - name: Send Slack notification
        env:
          # 사용자가 등록할 단 하나의 시크릿. 미설정이면 아래 가드가 건너뛴다.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          # 시크릿 가드: SLACK_WEBHOOK_URL 이 없으면(아직 미설정) 빨갛게 실패시키지
          # 않고 조용히 건너뛴다 — 시크릿을 넣기 전에도 워크플로는 초록으로 통과한다.
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::notice::SLACK_WEBHOOK_URL 미설정 — 알림 건너뜀. (Settings → Secrets → Actions 에 추가하세요)"
            exit 0
          fi

          # PR 이벤트 페이로드에서 사람이 읽을 정보를 뽑는다. workflow_dispatch(수동)
          # 실행에는 pull_request 객체가 없으므로 모두 폴백을 둔다.
          EV="${GITHUB_EVENT_PATH}"
          PR_NUM=$(jq -r '.pull_request.number // ""' "$EV")
          # 제목 첫 줄만(여러 줄 제목 방지). 수동 실행이면 테스트 문구로 폴백.
          PR_TITLE=$(jq -r '(.pull_request.title // "수동 실행(테스트 알림)") | split("\n")[0]' "$EV")
          PR_URL=$(jq -r '.pull_request.html_url // ""' "$EV")
          PR_URL="${PR_URL:-https://github.com/${GITHUB_REPOSITORY}}"
          PR_AUTHOR=$(jq -r '.pull_request.user.login // "unknown"' "$EV")
          MERGED_BY=$(jq -r '.pull_request.merged_by.login // .sender.login // "unknown"' "$EV")
          BASE_REF=$(jq -r '.pull_request.base.ref // "main"' "$EV")
          HEAD_REF=$(jq -r '.pull_request.head.ref // "-"' "$EV")
          PR_COMMITS=$(jq -r '.pull_request.commits // 0' "$EV")

          # 헤더에 쓸 "#번호" — 수동 실행이면 번호가 없으니 비워 둔다.
          PR_TAG=""
          [ -n "${PR_NUM}" ] && PR_TAG="#${PR_NUM} "

          # jq 로 페이로드를 만든다 — PR 제목의 따옴표/특수문자가 그대로 안전하게
          # escape 되어 JSON 이 깨지지 않는다(직접 문자열 조립 금지).
          PAYLOAD=$(jq -n \
            --arg repo    "${GITHUB_REPOSITORY}" \
            --arg tag     "${PR_TAG}" \
            --arg title   "${PR_TITLE}" \
            --arg url     "${PR_URL}" \
            --arg author  "${PR_AUTHOR}" \
            --arg merger  "${MERGED_BY}" \
            --arg base    "${BASE_REF}" \
            --arg head    "${HEAD_REF}" \
            --arg commits "${PR_COMMITS}" \
            '
            # Slack mrkdwn 안전: 자유 입력인 PR 제목의 & < > 를 먼저 이스케이프해야
            # <url|라벨> 링크 문법이 깨지지 않는다(& 를 가장 먼저 치환).
            (($title | gsub("&";"&amp;") | gsub("<";"&lt;") | gsub(">";"&gt;"))) as $st
            | {
              text: "✅ \($repo): PR \($tag)머지됨 — \($st)",
              blocks: [
                { type: "header",
                  text: { type: "plain_text", text: "✅ PR 머지 알림", emoji: true } },
                { type: "section",
                  text: { type: "mrkdwn", text: "*<\($url)|PR \($tag)\($st)>*" } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*저장소:*\n\($repo)" },
                    { type: "mrkdwn", text: "*브랜치:*\n\($head) → \($base)" },
                    { type: "mrkdwn", text: "*작성자:*\n\($author)" },
                    { type: "mrkdwn", text: "*머지한 사람:*\n\($merger)" },
                    { type: "mrkdwn", text: "*커밋 수:*\n\($commits)" }
                ] },
                { type: "actions", elements: [
                    { type: "button",
                      text: { type: "plain_text", text: "PR 보기", emoji: true },
                      url: $url }
                ] }
              ]
            }')

          # Slack Incoming Webhook 으로 전송. 성공 시 200 'ok' 를 돌려준다.
          HTTP=$(curl -sS -o /tmp/slack_resp -w "%{http_code}" \
            -X POST -H 'Content-type: application/json' \
            --data "${PAYLOAD}" "${SLACK_WEBHOOK_URL}")
          echo "Slack 응답 HTTP ${HTTP}: $(cat /tmp/slack_resp)"

          # 200 이 아니면(잘못된 webhook URL 등) 워크플로를 실패로 표시해 알린다.
          if [ "${HTTP}" != "200" ]; then
            echo "::error::Slack 전송 실패 (HTTP ${HTTP}). Webhook URL 을 확인하세요."
            exit 1
          fi
