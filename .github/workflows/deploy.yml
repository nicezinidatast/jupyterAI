# main 에 push(=머지) 되면 GitHub 클라우드 러너가 prod 서버에 SSH 로 접속해
#   git reset --hard origin/main  +  docker compose -f compose.prod.yml up -d --build
# 로 자동 배포한다. (수동 배포 흐름 — git pull + compose up --build — 을 그대로 자동화)
#
# ※ self-hosted 러너 불필요. GitHub 클라우드에서 SSH 로 들어가므로 서버에 러너를
#   설치/등록할 필요가 없다(러너 등록·runsvc.sh 이슈와 무관). 단, 서버가 GitHub
#   클라우드에서 SSH 로 닿을 수 있어야 한다(공인 IP/도메인 + 22번 포트 인바운드 허용).
#
# ── 필요한 GitHub Secrets (repo Settings → Secrets and variables → Actions → New repository secret) ──
#   PROD_SSH_HOST   : 서버 주소(공인 IP 또는 도메인)
#   PROD_SSH_USER   : SSH 사용자 (예: ubuntu, ec2-user)
#   PROD_SSH_KEY    : SSH 개인키 전체(-----BEGIN ... END-----). 공개키는 서버 ~/.ssh/authorized_keys 에 등록돼 있어야 함
#   PROD_REPO_PATH  : 서버에서 이 저장소가 clone 된 절대경로 (예: /home/ubuntu/0521_platform)
#   PROD_SSH_PORT   : (선택) SSH 포트, 미설정 시 22
#   SLACK_WEBHOOK_URL : (선택) Slack Incoming Webhook URL. 설정하면 배포 시작/종료를 Slack 으로 알림.
#                       없으면 알림만 조용히 건너뛰고 배포는 정상 동작.
#
# ── 서버 사전 준비(1회) ──
#   1) git clone https://github.com/nicezinidatast/jupyterAI.git <PROD_REPO_PATH>  (브랜치 main)
#   2) docker + docker compose(v2) 설치
#   3) 서버 .env 준비:  infra/docker-compose/.env  +  backend/.env  (시크릿 — git 에 없음)
#   4) 배포용 SSH 키쌍 생성(ssh-keygen) → 공개키는 서버 ~/.ssh/authorized_keys 에,
#      개인키는 위 PROD_SSH_KEY 시크릿에 등록.
#
# 비밀값(.env)은 git 에 올리지 않고 서버에 두며, 이 워크플로는 코드만 갱신·재빌드한다
# (.env 는 git 무시 파일이라 reset --hard 에 보존됨). DB 스키마는 앱 시작 시 멱등
# 보강되므로 수동 DB 작업 불필요.
name: deploy

on:
  push:
    branches: [main]
    # 런타임에 무관한 변경(워크플로·문서·마크다운)만 있는 push 는 재배포하지 않는다.
    # 앱 코드와 섞인 push 는 정상 배포(paths-ignore 는 '전부 무시 대상일 때만' 스킵).
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch: {}        # Actions 탭에서 수동 실행도 가능(paths 무관)

concurrency:
  group: deploy-main
  cancel-in-progress: false    # 진행 중인 배포는 취소하지 않음(중간 상태 방지)

jobs:
  # 배포 시작 알림(Slack). 배포 작업과 독립으로(=needs 없이) 곧바로 실행 →
  # Slack 이 막혀도 배포는 진행되고, SLACK_WEBHOOK_URL 시크릿이 없으면 알림만 조용히 건너뜀.
  notify-start:
    name: 배포 시작 알림 (Slack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4         # 로컬 composite 액션(./.github/actions/...)을 쓰려면 체크아웃 필요
      - uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: start

  deploy:
    name: prod 배포
    runs-on: ubuntu-latest
    steps:
      - name: SSH → git reset + compose up (prod)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true     # 한 줄이라도 실패하면 즉시 중단
          script: |
            cd "${{ secrets.PROD_REPO_PATH }}"
            git fetch --prune origin main
            git reset --hard origin/main
            docker compose -f infra/docker-compose/compose.prod.yml up -d --build --remove-orphans
            docker image prune -f

  # 배포 종료 알림(Slack). deploy 결과를 성공/실패로 보고.
  #   - needs: [deploy] + if: always() → 앞 작업이 실패·취소돼도 결과 알림은 반드시 보냄.
  notify-result:
    name: 배포 결과 알림 (Slack)
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          # deploy 가 success 일 때만 success, 그 외(실패·취소)는 failure
          status: ${{ needs.deploy.result == 'success' && 'success' || 'failure' }}
          details: "prod: ${{ needs.deploy.result }}"
