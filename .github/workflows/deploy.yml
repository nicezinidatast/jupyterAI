# main 에 push(=머지) 되면 서버의 self-hosted 러너가 자동 배포하고,
# Slack 으로 "배포 시작 / 성공 / 실패" 를 알린다.
#
# 왜 self-hosted 러너인가:
#   배포 대상(prod 서버)은 사내망 안에서만 SSH 가 되므로 GitHub 클라우드 러너가
#   SSH 로 들어갈 수 없다. 대신 서버는 github.com 으로 아웃바운드가 되므로(git pull
#   가능), 서버에 등록한 self-hosted 러너가 작업을 받아 "로컬에서" 배포한다.
#   ※ Slack 알림(notify-*)은 클라우드 러너(ubuntu-latest)에서 보낸다 — 서버가
#     Slack 으로 못 나가도 알림은 항상 가고, 배포만 러너가 맡는다.
#
# ── 사전 준비(1회) ──
#   1) 서버에 self-hosted 러너 등록(Settings → Actions → Runners → New self-hosted runner).
#      ./config.sh ... 후  ./run.sh (또는 서비스 등록). 기본 라벨에 self-hosted 포함.
#   2) repo Variable  DEPLOY_DIR = 서버의 저장소 클론 절대경로(.env 가 있는 곳).
#      Settings → Secrets and variables → Actions → "Variables" 탭.
#   3) repo Secret    SLACK_WEBHOOK_URL = Slack Incoming Webhook URL(없으면 알림만 생략).
#
# 비밀값(.env)은 git 에 없고 서버에 두며, 이 워크플로는 코드만 갱신·재빌드한다
# (.env 는 git 무시라 reset --hard 에 보존됨). DB 스키마는 앱 시작 시 멱등 보강.
name: deploy

on:
  push:
    branches: [main]
    # 런타임에 무관한 변경(워크플로·문서·마크다운)만 있는 push 는 재배포하지 않는다.
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch: {}        # Actions 탭에서 수동 실행도 가능

concurrency:
  group: deploy-main
  cancel-in-progress: false    # 진행 중인 배포는 취소하지 않음(중간 상태 방지)

jobs:
  # 배포 시작 알림(Slack) — 클라우드 러너에서. 배포 작업과 독립으로 곧바로 실행.
  notify-start:
    name: 배포 시작 알림 (Slack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4         # 로컬 composite 액션을 쓰려면 체크아웃 필요
      - uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: start

  # 실제 배포 — 서버의 self-hosted 러너에서, 기존 클론(.env 있는 DEPLOY_DIR)에서 수행.
  deploy:
    name: prod 배포 (self-hosted)
    runs-on: [self-hosted]
    defaults:
      run:
        shell: bash
        working-directory: ${{ vars.DEPLOY_DIR || '/opt/0521_platform' }}
    steps:
      - name: git reset --hard + compose up --build
        run: |
          git fetch --prune origin main
          git reset --hard origin/main
          docker compose -f infra/docker-compose/compose.prod.yml up -d --build --remove-orphans
          docker image prune -f

  # 배포 종료 알림(Slack) — 클라우드 러너에서. deploy 결과를 성공/실패로 보고.
  notify-result:
    name: 배포 결과 알림 (Slack)
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ needs.deploy.result == 'success' && 'success' || 'failure' }}
          details: "prod: ${{ needs.deploy.result }}"
