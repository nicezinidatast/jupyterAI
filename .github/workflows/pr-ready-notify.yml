# PR 의 검토(Claude)와 CI 결과를 Slack 으로 알린다 — 성공·실패 둘 다.
#   - 둘 다 통과 + 머지 충돌 없음 → "✅ 머지 준비 완료"
#   - CI 또는 검토가 실패        → "❌ 검사 실패"
#   - 통과했지만 머지 충돌        → "⚠️ 머지 충돌"
# 배포 알림과 '같은 리치 포맷'을 쓰도록 공용 composite 액션(.github/actions/slack-notify)으로 전송한다.
# 로컬 폴링(윈도우 작업 스케줄러 등)을 대체 — GitHub 에서 마지막 검사가 끝나는 즉시 동작(PC 불필요).
#
# 동작:
#   CI / Claude PR review 워크플로가 완료될 때마다 트리거. 방금 끝난 워크플로가 '실패'면
#   즉시 실패 알림을, '성공'이면 양쪽이 모두 통과했는지 확인 후 준비/충돌 알림을 보낸다.
#
# 전제:
#   - ※ workflow_run 트리거라 이 파일은 기본 브랜치(main)에 있어야 동작한다(브랜치에선 안 돎).
#   - SLACK_WEBHOOK_URL 시크릿(배포 알림과 동일) 재사용. 미설정이면 조용히 건너뜀.
#   - ※ gh pr list 는 반드시 `--repo "$REPO"` 를 줘야 한다(로컬 git 컨텍스트가 PR 의 것이 아님).
#
# ADAPT: workflows: 의 이름은 이 리포의 CI / 리뷰 워크플로 `name:` 과 정확히 일치해야 한다
#        (ci.yml 의 name 이 "CI", claude-review.yml 의 name 이 "Claude PR review" 가 기본값).
name: PR ready notify

on:
  workflow_run:
    workflows: ["CI", "Claude PR review"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: pr-ready-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  notify:
    name: 검토·CI 결과 → Slack 알림(성공·실패 모두)
    runs-on: ubuntu-latest
    # PR 에서 온 실행만, 기본 브랜치 제외. 성공·실패 분기는 아래 스크립트에서.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_branch != github.event.repository.default_branch
    steps:
      - uses: actions/checkout@v4         # 로컬 composite 액션(./.github/actions/slack-notify)을 쓰려면 체크아웃 필요

      - name: 결과 판정 (준비 완료 / 검사 실패 / 머지 충돌)
        id: judge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          THIS_NAME: ${{ github.event.workflow_run.name }}
          THIS_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail

          # webhook 미설정이면 판정·조회 없이 종료(아래 알림 step 은 status 가 비어 skip).
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL 미설정 — 알림 건너뜀."; exit 0
          fi

          # 이 브랜치의 열린 PR(성공·실패 모두 PR 정보가 필요). --repo 필수.
          pr="$(gh pr list --repo "$REPO" --head "$BRANCH" --base "$DEFAULT_BRANCH" --state open \
                --json number,title,url,mergeable --jq '.[0] // empty')"
          if [ -z "$pr" ]; then echo "열린 PR 없음 — 종료"; exit 0; fi
          num="$(echo "$pr" | jq -r '.number')"
          title="$(echo "$pr" | jq -r '.title')"
          url="$(echo "$pr" | jq -r '.url')"
          mergeable="$(echo "$pr" | jq -r '.mergeable')"     # MERGEABLE / CONFLICTING / UNKNOWN

          status=""; details=""
          case "$THIS_CONCLUSION" in
            failure|timed_out|startup_failure)
              status="checks-failed"; details="실패한 검사: ${THIS_NAME} · 수정이 필요함";;
            success)
              # 이 head SHA 의 'CI' 와 'Claude PR review' 최신 결과(conclusion).
              runs="$(gh api "repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&per_page=100")"
              ci="$(echo "$runs" | jq -r '[.workflow_runs[]|select(.name=="CI")]|sort_by(.created_at)|last|.conclusion // "pending"')"
              review="$(echo "$runs" | jq -r '[.workflow_runs[]|select(.name=="Claude PR review")]|sort_by(.created_at)|last|.conclusion // "pending"')"
              echo "head=${HEAD_SHA:0:7} CI=$ci review=$review mergeable=$mergeable"
              if [ "$ci" != "success" ]; then echo "CI 미통과 — 대기"; exit 0; fi
              case "$review" in
                success|neutral|skipped) ;;
                *) echo "리뷰 미완료 — 대기"; exit 0;;
              esac
              if [ "$mergeable" = "CONFLICTING" ]; then
                status="conflict"; details="검토·CI 는 통과했지만 충돌 해결이 필요함"
              else
                status="ready"; details="검토·CI 모두 통과 · 충돌 없음"
              fi;;
            *) echo "결론 '${THIS_CONCLUSION}' — 알림 대상 아님(취소/스킵 등)"; exit 0;;
          esac

          # 멀티라인/특수문자 안전하게 output 으로 전달(heredoc).
          ident="$(printf 'PR `#%s`' "$num")"
          {
            echo "status=$status"
            echo "branch=$BRANCH"
            echo "url=$url"
            echo "ident<<__EOF__"; echo "$ident"; echo "__EOF__"
            echo "body<<__EOF__";  echo "$title"; echo "__EOF__"
            echo "details<<__EOF__"; echo "$details"; echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Slack 알림 (배포 알림과 동일 형식)
        if: steps.judge.outputs.status != ''
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ steps.judge.outputs.status }}
          branch: ${{ steps.judge.outputs.branch }}
          ident: ${{ steps.judge.outputs.ident }}
          body: ${{ steps.judge.outputs.body }}
          details: ${{ steps.judge.outputs.details }}
          button-text: "PR 보기"
          button-url: ${{ steps.judge.outputs.url }}
