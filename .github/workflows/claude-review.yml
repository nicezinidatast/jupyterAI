# PR 이 열리거나(=opened) 새 커밋이 올라오면(=synchronize) Claude 가 변경 코드를 검토한다.
#   - 명백하고 안전한 오류(문법 오류·오타·확실한 버그)는 PR 브랜치에 직접 수정 커밋
#   - 판단이 필요한 사항은 PR 코멘트로 의견만 (승인은 사람이)
#
# ※ 트리거가 'pull_request' 인 이유: anthropics/claude-code-action 은 push 이벤트를
#   지원하지 않는다(PR 계열 이벤트 전용). 브랜치 push → auto-pr.yml PR 오픈 → 이 검토.
# ※ 자동수정 커밋은 GITHUB_TOKEN(use_commit_signing)으로 올라가 검토를 다시 트리거하지
#   않는다 → 무한 검토 루프가 안 생긴다.
#
# ── 필요한 GitHub Secret ──
#   CLAUDE_CODE_OAUTH_TOKEN : Claude 구독 토큰 (claude setup-token 으로 발급해 등록)
name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true     # 같은 PR 에 연속 push 시 이전 검토는 취소

jobs:
  review:
    name: Claude 검토 + 자동수정
    runs-on: ubuntu-latest
    permissions:
      contents: write            # PR 브랜치에 수정 커밋
      pull-requests: write       # PR 코멘트 작성
      id-token: write            # 공식 예시와 동일(미사용이어도 무해)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}   # PR 브랜치로 체크아웃
          fetch-depth: 0                                    # main 과 diff + 커밋용 전체 이력
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_commit_signing: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            위 PR 의 변경 코드를 한국어로 검토하세요.
            이 저장소는 데이터 분석 플랫폼 모노레포입니다 — 백엔드는 Python(FastAPI),
            units/*/src(공유 lib·auth·audit·credential·data·notebook·copilot·admin) + backend/
            (uv workspace), 인프라는 Docker(infra/ — compose·jupyterhub·portal nginx),
            프론트는 TypeScript/React+Vite+Mantine SPA(units/admin-unit/* — admin-console·
            auditor-console·analyst-workspace·platform-login).

            점검 항목: 버그·로직 오류 / 보안(비밀값 노출·SQL 주입·인증·인가 우회·CORS·
                       PII 마스킹 우회) / 사용자별 JupyterHub 격리(컨테이너·볼륨 분리) /
                       코파일럿 컨텍스트·셀 주입 안전성 / 프론트-백엔드 계약(/api 경로·
                       SSE/스트리밍 이벤트·응답 형태) 불일치.

            처리 방법:
              - 명백하고 안전한 오류(문법 오류·오타·확실한 버그)는 파일을 직접 수정하세요.
                수정은 자동으로 PR 브랜치에 커밋됩니다. 무엇을 왜 고쳤는지 한 줄 코멘트로 남기세요.
              - 판단·설계 결정이 필요한 사항은 고치지 말고 PR 코멘트로 의견만 남기세요.
              - LLM 프롬프트 문자열(units/copilot-unit/.../prompts.py 등)과 SQL 안전가드,
                기능성 문자열(UI 텍스트·로그·예외·정규식)은 함부로 바꾸지 마세요.
                주석/문서는 한국어, 기능성 문자열은 원문 유지가 이 저장소 규칙입니다.
              - 승인(approve)은 하지 마세요 — 최종 판단·머지는 사람이 합니다.
              - 특이사항이 없으면 "특이사항 없음"이라고 짧게 남기면 됩니다.
          claude_args: |
            --allowedTools "Edit,Write,Read,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
