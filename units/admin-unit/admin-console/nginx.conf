server {
    listen 80;
    server_name _;

    # When proxied behind another reverse-proxy / non-default port, returning
    # absolute redirects with the wrong port breaks the browser hop.
    absolute_redirect off;
    port_in_redirect off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # SPA assets
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Proxy /api/* to the backend (browser sees same-origin)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Health
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Friendly root redirect
    location = / {
        return 302 /admin/;
    }
}
